<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">VeriLock flow</title>
  <desc id="desc">Four steps: fingerprint, sign, seal, verify</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d112e"/>
      <stop offset="100%" stop-color="#151a3d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2348"/>
      <stop offset="100%" stop-color="#141938"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <path d="M 190 210 H 1010" stroke="#5eead4" stroke-opacity="0.28" stroke-width="3" stroke-linecap="round"/>
  <!-- step 1 -->
  <g transform="translate(70,90)">
    <rect width="220" height="240" rx="20" fill="url(#card)" stroke="#5eead4" stroke-opacity="0.35"/>
    <circle cx="110" cy="78" r="36" fill="#12203a" stroke="#5eead4" stroke-width="2" filter="url(#glow)"/>
    <path d="M110 54c-10 12-16 22-16 32a16 16 0 1032 0c0-10-6-20-16-32z" fill="none" stroke="#5eead4" stroke-width="2.5"/>
    <circle cx="110" cy="88" r="4" fill="#5eead4"/>
    <text x="110" y="150" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em">1</text>
    <text x="110" y="178" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Fingerprint</text>
    <text x="110" y="206" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">SHA-256 in browser</text>
    <text x="110" y="228" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">PDF stays local</text>
  </g>
  <!-- step 2 -->
  <g transform="translate(350,90)">
    <rect width="220" height="240" rx="20" fill="url(#card)" stroke="#7dd3fc" stroke-opacity="0.35"/>
    <circle cx="110" cy="78" r="36" fill="#12203a" stroke="#7dd3fc" stroke-width="2" filter="url(#glow)"/>
    <path d="M92 78h36M110 60v36" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="96" cy="70" r="8" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="124" cy="86" r="8" fill="none" stroke="#7dd3fc" stroke-width="2"/>
    <text x="110" y="150" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em">2</text>
    <text x="110" y="178" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Sign</text>
    <text x="110" y="206" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Same file for all</text>
    <text x="110" y="228" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Nimiq wallets</text>
  </g>
  <!-- step 3 -->
  <g transform="translate(630,90)">
    <rect width="220" height="240" rx="20" fill="url(#card)" stroke="#fcd34d" stroke-opacity="0.4"/>
    <circle cx="110" cy="78" r="36" fill="#12203a" stroke="#fcd34d" stroke-width="2" filter="url(#glow)"/>
    <circle cx="110" cy="78" r="16" fill="none" stroke="#fcd34d" stroke-width="2.5"/>
    <circle cx="110" cy="78" r="6" fill="#fcd34d"/>
    <text x="110" y="150" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em">3</text>
    <text x="110" y="178" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Seal</text>
    <text x="110" y="206" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Hash on Nimiq</text>
    <text x="110" y="228" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Permanent record</text>
  </g>
  <!-- step 4 -->
  <g transform="translate(910,90)">
    <rect width="220" height="240" rx="20" fill="url(#card)" stroke="#86efac" stroke-opacity="0.4"/>
    <circle cx="110" cy="78" r="36" fill="#12203a" stroke="#86efac" stroke-width="2" filter="url(#glow)"/>
    <path d="M96 80l10 10 20-22" fill="none" stroke="#86efac" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="110" y="150" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em">4</text>
    <text x="110" y="178" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-size="22" font-weight="700">Verify</text>
    <text x="110" y="206" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">Re-hash any copy</text>
    <text x="110" y="228" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="14">No wallet needed</text>
  </g>
</svg>
