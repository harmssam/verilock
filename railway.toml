# Production SPA (light shell + journey) at root.
# VeriLock-Journey may still use railway.service-b.toml or
# RAILWAY_DOCKERFILE_PATH=Dockerfile.service-b (identical packaging aliases).

[build]
builder = "nixpacks"
buildCommand = "npm install && npm install --prefix server && npm install --prefix client && npm run build --prefix client"

[deploy]
# Uses Dockerfile CMD (WORKDIR /app/server)
startCommand = "node --import tsx src/index.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
