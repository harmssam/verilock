# Alias of railway.toml (journey UI at SPA root).
# Existing services may still point config-as-code path here.
# Prefer /railway.toml for new setup.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.service-b"

[deploy]
startCommand = "node --import tsx src/index.ts"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
